name: CI/CD Recommender System

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install --upgrade pip poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install

      - name: Lint
        run: |
          pip install --upgrade ruff
          poetry run ruff check .

      - name: Run tests
        run: poetry run python -m pytest -q

      - name: Configure DVC remotes
        shell: bash
        env:
          DVC_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          DVC_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          DVC_ENDPOINTURL: ${{ secrets.DVC_ENDPOINTURL }}
        run: |
          ACCESS_KEY="${DVC_ACCESS_KEY_ID:-$MINIO_ACCESS_KEY}"
          SECRET_KEY="${DVC_SECRET_ACCESS_KEY:-$MINIO_SECRET_KEY}"
          if [ -z "$ACCESS_KEY" ] || [ -z "$SECRET_KEY" ]; then
            echo "WARNING: DVC secrets are not set; trying to use existing .dvc/config.local credentials."
          else
            poetry run dvc remote modify --local myremote access_key_id "$ACCESS_KEY"
            poetry run dvc remote modify --local myremote secret_access_key "$SECRET_KEY"
            if [ -n "$DVC_ENDPOINTURL" ]; then
              poetry run dvc remote modify myremote endpointurl "$DVC_ENDPOINTURL"
            fi
          fi

      - name: Pull dataset from DVC (for quality gate)
        shell: bash
        run: |
          poetry run dvc pull

      - name: Quality gate NDCG@10 > 0.5
        shell: bash
        run: |
          poetry run python scripts/quality_gate.py --data data/user_history.csv --threshold 0.5

  train:
    name: Train model & log to MLflow
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug context (safe)
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install --upgrade pip poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install

      - name: Configure DVC remotes
        shell: bash
        env:
          DVC_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          DVC_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          DVC_ENDPOINTURL: ${{ secrets.DVC_ENDPOINTURL }}
        run: |
          echo "DVC_ACCESS_KEY_ID present? $([ -n "$DVC_ACCESS_KEY_ID" ] && echo yes || echo no)"
          echo "DVC_SECRET_ACCESS_KEY present? $([ -n "$DVC_SECRET_ACCESS_KEY" ] && echo yes || echo no)"
          echo "MINIO_ACCESS_KEY present? $([ -n "$MINIO_ACCESS_KEY" ] && echo yes || echo no)"
          echo "MINIO_SECRET_KEY present? $([ -n "$MINIO_SECRET_KEY" ] && echo yes || echo no)"
          echo "DVC_ENDPOINTURL present? $([ -n "$DVC_ENDPOINTURL" ] && echo yes || echo no)"

          ACCESS_KEY="${DVC_ACCESS_KEY_ID:-$MINIO_ACCESS_KEY}"
          SECRET_KEY="${DVC_SECRET_ACCESS_KEY:-$MINIO_SECRET_KEY}"
          if [ -z "$ACCESS_KEY" ] || [ -z "$SECRET_KEY" ]; then
            echo "WARNING: DVC secrets are not set; trying to use existing .dvc/config.local credentials."
          else
            poetry run dvc remote modify --local myremote access_key_id "$ACCESS_KEY"
            poetry run dvc remote modify --local myremote secret_access_key "$SECRET_KEY"
            if [ -n "$DVC_ENDPOINTURL" ]; then
              poetry run dvc remote modify myremote endpointurl "$DVC_ENDPOINTURL"
            fi
          fi

          echo "Configured DVC remotes:"
          poetry run dvc remote list

          # Если в проекте есть отдельный remote для моделей — тоже настраиваем.
          if poetry run dvc remote list | grep -q "^models_storage"; then
            if [ -n "$ACCESS_KEY" ] && [ -n "$SECRET_KEY" ]; then
              poetry run dvc remote modify --local models_storage access_key_id "$ACCESS_KEY"
              poetry run dvc remote modify --local models_storage secret_access_key "$SECRET_KEY"
              if [ -n "$DVC_ENDPOINTURL" ]; then
                poetry run dvc remote modify models_storage endpointurl "$DVC_ENDPOINTURL"
              fi
            fi
          fi

      - name: Pull dataset from DVC
        shell: bash
        run: |
          echo "Running dvc pull..."
          poetry run dvc pull
          echo "Checking expected dataset file..."
          if [ -f data/user_history.csv ]; then
            echo "data/user_history.csv exists"
          else
            echo "data/user_history.csv missing after dvc pull"
            exit 1
          fi

      - name: Train model and log to MLflow
        shell: bash
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_NAME: lab5_variant7_recommender
          DVC_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          DVC_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          DVC_ENDPOINTURL: ${{ secrets.DVC_ENDPOINTURL }}
        run: |
          echo "MLFLOW_TRACKING_URI present? $([ -n "$MLFLOW_TRACKING_URI" ] && echo yes || echo no)"
          if [ -z "$MLFLOW_TRACKING_URI" ]; then
            echo "MLFLOW_TRACKING_URI secret is not set"
            exit 1
          fi

          ACCESS_KEY="${DVC_ACCESS_KEY_ID:-$MINIO_ACCESS_KEY}"
          SECRET_KEY="${DVC_SECRET_ACCESS_KEY:-$MINIO_SECRET_KEY}"
          ENDPOINT="${DVC_ENDPOINTURL:-$MLFLOW_S3_ENDPOINT_URL}"

          # fallback на переменные окружения раннера (если secrets не прокинулись в job)
          if [ -z "$ACCESS_KEY" ] && [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
            ACCESS_KEY="$AWS_ACCESS_KEY_ID"
          fi
          if [ -z "$SECRET_KEY" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            SECRET_KEY="$AWS_SECRET_ACCESS_KEY"
          fi

          echo "Resolved AWS access key present? $([ -n "$ACCESS_KEY" ] && echo yes || echo no)"
          echo "Resolved AWS secret key present? $([ -n "$SECRET_KEY" ] && echo yes || echo no)"
          echo "Resolved S3 endpoint present? $([ -n "$ENDPOINT" ] && echo yes || echo no)"

          if [ -z "$ACCESS_KEY" ] || [ -z "$SECRET_KEY" ] || [ -z "$ENDPOINT" ]; then
            echo "Missing credentials for MLflow artifact upload to S3/MinIO"
            exit 1
          fi

          export AWS_ACCESS_KEY_ID="$ACCESS_KEY"
          export AWS_SECRET_ACCESS_KEY="$SECRET_KEY"
          export MLFLOW_S3_ENDPOINT_URL="$ENDPOINT"

          poetry run python scripts/train_recommendation_model.py --data data/user_history.csv --require-mlflow

  build:
    name: Build Docker images locally
    runs-on: self-hosted
    needs: train
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create .env file
        shell: bash
        run: |
          cat > .env <<'EOF'
          REDIS_URL=redis://redis:6379/0
          MINIO_ENDPOINT=http://minio:9000
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          MINIO_MODEL_BUCKET=models
          MLFLOW_TRACKING_URI=http://mlflow:5000
          EOF

      - name: Resolve Docker CLI
        id: docker_cli
        shell: bash
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "docker_bin=docker" >> "$GITHUB_OUTPUT"
            if docker ps >/dev/null 2>&1; then
              echo "use_sudo=false" >> "$GITHUB_OUTPUT"
            elif command -v sudo >/dev/null 2>&1 && sudo -n docker ps >/dev/null 2>&1; then
              echo "use_sudo=true" >> "$GITHUB_OUTPUT"
            else
              echo "ERROR: docker daemon access denied for current user."
              echo "Fix on runner host: sudo usermod -aG docker \$USER && newgrp docker"
              echo "Or allow passwordless sudo for docker command."
              exit 1
            fi
            docker --version || true
            exit 0
          fi

          if [ -x "/mnt/c/Program Files/Docker/Docker/resources/bin/docker.exe" ]; then
            echo "docker_bin=/mnt/c/Program Files/Docker/Docker/resources/bin/docker.exe" >> "$GITHUB_OUTPUT"
            echo "docker_cmd=\"/mnt/c/Program Files/Docker/Docker/resources/bin/docker.exe\"" >> "$GITHUB_OUTPUT"
            "/mnt/c/Program Files/Docker/Docker/resources/bin/docker.exe" --version
            exit 0
          fi

          echo "Docker CLI not found in runner environment."
          echo "If this is WSL2 runner, enable Docker Desktop -> Settings -> Resources -> WSL Integration."
          exit 1

      - name: Build API image
        shell: bash
        run: |
          if [ "${{ steps.docker_cli.outputs.use_sudo }}" = "true" ]; then
            sudo docker build -f Dockerfile -t recsys-api:latest .
          else
            "${{ steps.docker_cli.outputs.docker_bin }}" build -f Dockerfile -t recsys-api:latest .
          fi

      - name: Build Worker image
        shell: bash
        run: |
          if [ "${{ steps.docker_cli.outputs.use_sudo }}" = "true" ]; then
            sudo docker build -f Dockerfile.worker -t recsys-worker:latest .
          else
            "${{ steps.docker_cli.outputs.docker_bin }}" build -f Dockerfile.worker -t recsys-worker:latest .
          fi

