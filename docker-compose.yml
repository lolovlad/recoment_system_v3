services:
  redis:
    image: redis:7-alpine
    container_name: redis_recommender_system_v3
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_net

  api:
    image: recsys-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_recommender_system_v3
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_MODEL_BUCKET: models
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - app_net
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro

  worker:
    image: recsys-worker:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker_recommender_system_v3
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_MODEL_BUCKET: models
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: recsys_model
      MLFLOW_MODEL_STAGE: Production
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - app_net
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro

  minio:
    image: minio/minio:latest
    container_name: minio_recommender_system_v3
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

  minio-init:
    image: minio/mc:latest
    container_name: minio_init_buckets_v3
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/datasets --ignore-existing;
      mc mb myminio/models --ignore-existing;
      mc mb myminio/${MLFLOW_BUCKET:-mlflow} --ignore-existing;
      mc anonymous set download myminio/datasets;
      echo 'Бакеты datasets, models и ${MLFLOW_BUCKET:-mlflow} созданы успешно';
      "
    volumes:
      - minio_data:/data
    networks:
      - app_net

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server_v3
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_IGNORE_TLS: "true"
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - app_net
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://${MLFLOW_BUCKET:-mlflow}/artifacts/
    volumes:
      - ./data/mlflow:/mlflow

volumes:
  minio_data:

networks:
  app_net:
    driver: bridge
