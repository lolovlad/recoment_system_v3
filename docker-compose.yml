services:
  redis:
    image: redis:7-alpine
    container_name: redis_recommender_system_v3
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_recommender_system_v3
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_MODEL_BUCKET: models
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - app_net
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker_recommender_system_v3
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_MODEL_BUCKET: models
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - app_net
    volumes:
      - ./models:/app/models
      - ./data:/app/data:ro

  minio:
    image: minio/minio:latest
    container_name: minio_recommender_system_v3
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_net

  minio-init:
    image: minio/mc:latest
    container_name: minio_init_buckets_v3
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/datasets --ignore-existing;
      mc mb myminio/models --ignore-existing;
      mc anonymous set download myminio/datasets;
      echo 'Бакеты datasets и models созданы успешно';
      "
    volumes:
      - minio_data:/data
    networks:
      - app_net

volumes:
  minio_data:

networks:
  app_net:
    driver: bridge
